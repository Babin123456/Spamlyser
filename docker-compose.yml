version: "3.9"

services:
  spamlyser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spamlyser-pro
    ports:
      - "8501:8501"
    volumes:
      - spamlyser_data:/app/data
      - ./config:/app/config:ro
    environment:
      - SPAMLYSER_DATA_DIR=/app/data
      - SPAMLYSER_MODEL_CACHE_DIR=/app/cache
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  spamlyser_data:
